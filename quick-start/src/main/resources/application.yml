# Spring AI Quick Start Configuration
# 版本兼容性: Spring Boot 3.2.5 + Spring AI 1.0.0 + Java 17
server:
  port: 8082
spring:
  application:
    name: spring-ai-quickstart

  # DeepSeek配置
  ai:
    deepseek:
      api-key:
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat

    # 千问(DashScope)配置
    dashscope:
      api-key:
      base-url: https://dashscope.aliyuncs.com
      chat:
        options:
          model: qwen-plus


logging:
  level:
    org.springframework.ai: DEBUG
